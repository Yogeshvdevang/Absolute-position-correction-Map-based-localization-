<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Quadcopter body -->
  <rect x="20" y="20" width="8" height="8" fill="currentColor" rx="1"/>
  
  <!-- Arms -->
  <line x1="24" y1="24" x2="10" y2="10" stroke="currentColor" stroke-width="2"/>
  <line x1="24" y1="24" x2="38" y2="10" stroke="currentColor" stroke-width="2"/>
  <line x1="24" y1="24" x2="10" y2="38" stroke="currentColor" stroke-width="2"/>
  <line x1="24" y1="24" x2="38" y2="38" stroke="currentColor" stroke-width="2"/>
  
  <!-- Propellers -->
  <circle cx="10" cy="10" r="5" fill="currentColor" opacity="0.7"/>
  <circle cx="38" cy="10" r="5" fill="currentColor" opacity="0.7"/>
  <circle cx="10" cy="38" r="5" fill="currentColor" opacity="0.7"/>
  <circle cx="38" cy="38" r="5" fill="currentColor" opacity="0.7"/>
  
  <!-- Center camera -->
  <circle cx="24" cy="24" r="3" fill="currentColor" opacity="0.9"/>
</svg>
