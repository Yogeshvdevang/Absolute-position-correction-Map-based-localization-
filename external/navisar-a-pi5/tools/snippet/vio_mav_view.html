<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VIO MAV Isolated</title>
    <style>
      body { margin: 0; background: #000; color: #e8e8e8; font-family: system-ui, sans-serif; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 12px; }
      h1 { margin: 0 0 10px; font-size: 18px; }
      .grid { display: grid; gap: 10px; grid-template-columns: 1fr 320px; }
      .panel { background: #070707; border: 1px solid #222; border-radius: 10px; padding: 8px; }
      img { width: 100%; display: block; border-radius: 8px; background: #000; }
      pre { margin: 0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>VIO MAV Isolated Camera Output</h1>
      <div class="grid">
        <div class="panel">
          <img src="/video" alt="VIO Stream" />
        </div>
        <div class="panel">
          <pre id="state">loading...</pre>
        </div>
      </div>
    </div>
    <script>
      const stateEl = document.getElementById("state");
      async function tick() {
        try {
          const r = await fetch("/state", { cache: "no-store" });
          const d = await r.json();
          stateEl.textContent = JSON.stringify(d, null, 2);
        } catch (e) {
          stateEl.textContent = "state fetch error";
        }
      }
      setInterval(tick, 250);
      tick();
    </script>
  </body>
  </html>
