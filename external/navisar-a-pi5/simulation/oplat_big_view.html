<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Optical Flow Big View</title>
    <style>
      :root {
        --bg: #05070c;
        --panel: #0d111b;
        --panel-border: #1f2937;
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #2563eb;
      }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .page {
        max-width: 1700px;
        margin: 0 auto;
        padding: 10px;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }
      h1 {
        margin: 0;
        font-size: 16px;
        letter-spacing: 0.04em;
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      button {
        border: 1px solid #334155;
        background: #1e293b;
        color: #e2e8f0;
        border-radius: 999px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 12px;
      }
      button:hover { background: #334155; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 10px;
      }
      .tuning-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 8px;
      }
      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .filter-quick {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
      }
      .chip {
        border-radius: 999px;
        border: 1px solid #334155;
        background: #111827;
        color: #cbd5e1;
        padding: 6px 10px;
        font-size: 11px;
        line-height: 1;
      }
      .chip.active {
        background: #2563eb;
        border-color: #1d4ed8;
        color: #f8fafc;
      }
      .item label {
        display: block;
        margin-bottom: 4px;
        font-size: 11px;
        color: var(--muted);
      }
      .item select {
        width: 100%;
        border: 1px solid #334155;
        background: #111827;
        color: #e2e8f0;
        border-radius: 8px;
        padding: 7px 8px;
        font-family: inherit;
        font-size: 12px;
      }
      .item .val {
        color: var(--text);
        margin-left: 4px;
      }
      .item input[type="range"] { width: 100%; }
      .section-title {
        margin: 6px 0 8px;
        font-size: 12px;
        letter-spacing: 0.03em;
        color: #cbd5e1;
      }
      .ekf-preview {
        margin-top: 8px;
        font-size: 12px;
        color: #a5b4fc;
      }
      .plot-wrap {
        background: #fff;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 0;
        overflow: hidden;
      }
      #plot {
        display: block;
        width: 100%;
        height: clamp(420px, 72vh, 960px);
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
        min-height: 18px;
      }
      @media (max-width: 1200px) { .tuning-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      @media (max-width: 700px) {
        .tuning-grid { grid-template-columns: 1fr; }
        .top { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="top">
        <h1>Optical Flow Global Path - Dedicated Big View</h1>
        <div class="toolbar">
          <button id="save-btn" type="button">Save Tuning</button>
          <button id="default-btn" type="button">Default</button>
          <button id="reset-btn" type="button">Reset Path</button>
          <button id="back-btn" type="button">Back to Main</button>
        </div>
      </div>
      <div class="panel">
        <div class="tuning-grid" style="margin-bottom:6px;">
          <label class="toggle"><input id="swapxy" type="checkbox" /> Swap X/Y</label>
          <label class="toggle"><input id="invertx" type="checkbox" /> Invert X</label>
          <label class="toggle"><input id="inverty" type="checkbox" /> Invert Y</label>
          <div class="filter-quick">
            <button class="chip" id="filter-chip-ema" type="button" data-filter-mode="ema">EMA</button>
            <button class="chip" id="filter-chip-kf" type="button" data-filter-mode="kf">KF</button>
            <button class="chip" id="filter-chip-complementary" type="button" data-filter-mode="complementary">COMP</button>
          </div>
        </div>
        <div class="tuning-grid">
          <div class="item">
            <label for="gain">Flow Gain <span class="val" id="gain-val">1.000</span></label>
            <input id="gain" type="range" min="0.300" max="2.500" step="0.001" value="1.000" />
          </div>
          <div class="item">
            <label for="flow-alpha">Flow EMA Alpha <span class="val" id="flow-alpha-val">0.200</span></label>
            <input id="flow-alpha" type="range" min="0.010" max="1.000" step="0.001" value="0.200" />
          </div>
          <div class="item">
            <label for="deadband">Deadband (m/s) <span class="val" id="deadband-val">0.010</span></label>
            <input id="deadband" type="range" min="0.000" max="0.200" step="0.001" value="0.010" />
          </div>
          <div class="item">
            <label for="heading-bias">Yaw Bias (deg) <span class="val" id="heading-bias-val">0.0</span></label>
            <input id="heading-bias" type="range" min="-45.0" max="45.0" step="0.1" value="0.0" />
          </div>
          <div class="item">
            <label for="heading-alpha">Heading Smooth Alpha <span class="val" id="heading-alpha-val">0.250</span></label>
            <input id="heading-alpha" type="range" min="0.010" max="1.000" step="0.001" value="0.250" />
          </div>
          <div class="item">
            <label for="dt-max">DT Max (ms) <span class="val" id="dt-max-val">300</span></label>
            <input id="dt-max" type="range" min="50" max="500" step="1" value="300" />
          </div>
          <div class="item">
            <label for="dt-fallback">DT Fallback (ms) <span class="val" id="dt-fallback-val">50</span></label>
            <input id="dt-fallback" type="range" min="10" max="120" step="1" value="50" />
          </div>
          <div class="item">
            <label for="poll-ms">Refresh (ms) <span class="val" id="poll-ms-val">100</span></label>
            <input id="poll-ms" type="range" min="40" max="300" step="10" value="100" />
          </div>
        </div>
        <div class="section-title">Filter Selection & EKF GPS Tuning</div>
        <div class="tuning-grid">
          <div class="item">
            <label for="filter-mode">Filter Mode</label>
            <select id="filter-mode">
              <option value="ema">EMA (simple)</option>
              <option value="kf">Kalman (flow + IMU)</option>
              <option value="complementary">Complementary (flow + IMU)</option>
            </select>
          </div>
          <div class="item">
            <label for="flow-q-min">Flow Q Min <span class="val" id="flow-q-min-val">50</span></label>
            <input id="flow-q-min" type="range" min="0" max="255" step="1" value="50" />
          </div>
          <div class="item">
            <label for="dist-min">Dist Min (m) <span class="val" id="dist-min-val">0.05</span></label>
            <input id="dist-min" type="range" min="0.00" max="1.00" step="0.01" value="0.05" />
          </div>
          <div class="item">
            <label for="dist-max">Dist Max (m) <span class="val" id="dist-max-val">8.00</span></label>
            <input id="dist-max" type="range" min="1.00" max="20.00" step="0.10" value="8.00" />
          </div>
          <div class="item">
            <label for="speed-max">Flow Speed Max (m/s) <span class="val" id="speed-max-val">5.00</span></label>
            <input id="speed-max" type="range" min="0.20" max="12.00" step="0.10" value="5.00" />
          </div>
          <div class="item">
            <label for="kf-q">KF Q <span class="val" id="kf-q-val">0.050</span></label>
            <input id="kf-q" type="range" min="0.001" max="1.000" step="0.001" value="0.050" />
          </div>
          <div class="item">
            <label for="kf-r">KF R <span class="val" id="kf-r-val">0.020</span></label>
            <input id="kf-r" type="range" min="0.001" max="1.000" step="0.001" value="0.020" />
          </div>
          <div class="item">
            <label for="comp-alpha">Complementary Alpha <span class="val" id="comp-alpha-val">0.75</span></label>
            <input id="comp-alpha" type="range" min="0.00" max="1.00" step="0.01" value="0.75" />
          </div>
          <div class="item">
            <label for="ekf-hacc">EKF HAcc Base (m) <span class="val" id="ekf-hacc-val">0.60</span></label>
            <input id="ekf-hacc" type="range" min="0.10" max="10.00" step="0.05" value="0.60" />
          </div>
          <div class="item">
            <label for="ekf-vacc">EKF VAcc Base (m) <span class="val" id="ekf-vacc-val">1.20</span></label>
            <input id="ekf-vacc" type="range" min="0.20" max="15.00" step="0.05" value="1.20" />
          </div>
          <div class="item">
            <label for="ekf-sacc">EKF SAcc Base (m/s) <span class="val" id="ekf-sacc-val">0.35</span></label>
            <input id="ekf-sacc" type="range" min="0.05" max="5.00" step="0.01" value="0.35" />
          </div>
          <div class="item">
            <label for="ekf-lowq-hacc">Low-Q HAcc Scale <span class="val" id="ekf-lowq-hacc-val">3.0</span></label>
            <input id="ekf-lowq-hacc" type="range" min="1.0" max="10.0" step="0.1" value="3.0" />
          </div>
          <div class="item">
            <label for="ekf-lowq-sacc">Low-Q SAcc Scale <span class="val" id="ekf-lowq-sacc-val">2.0</span></label>
            <input id="ekf-lowq-sacc" type="range" min="1.0" max="10.0" step="0.1" value="2.0" />
          </div>
        </div>
        <div class="ekf-preview" id="ekf-preview">
          EKF out preview: mode=EMA use_gps=false reason=init hacc=-- vacc=-- sacc=--
        </div>
      </div>
      <div class="plot-wrap" style="margin-top:8px;">
        <canvas id="plot"></canvas>
      </div>
      <div class="status" id="status">Waiting for /data...</div>
    </div>

    <script>
      const STORAGE_KEY = "navisar_op_lat_tuning_v1";
      const DEFAULT_STORAGE_KEY = "navisar_op_lat_default_tuning_v1";
      const DEFAULTS = {
        swapXY: false,
        invertX: false,
        invertY: false,
        filterMode: "ema",
        flowGain: 1.0,
        flowEmaAlpha: 0.2,
        deadband: 0.01,
        headingBiasDeg: 0.0,
        headingSmoothAlpha: 0.25,
        dtMaxMs: 300,
        dtFallbackMs: 50,
        pollMs: 100,
        flowQualityMin: 50,
        distanceMinM: 0.05,
        distanceMaxM: 8.0,
        flowSpeedMaxMps: 5.0,
        kfQ: 0.05,
        kfR: 0.02,
        compAlpha: 0.75,
        ekfHaccBaseM: 0.60,
        ekfVaccBaseM: 1.20,
        ekfSaccBaseMps: 0.35,
        ekfLowQHaccScale: 3.0,
        ekfLowQSaccScale: 2.0,
      };

      const canvas = document.getElementById("plot");
      const ctx = canvas.getContext("2d");
      const statusEl = document.getElementById("status");
      let resizeHandle = null;
      let pollTimer = null;

      const controls = {
        swapXY: document.getElementById("swapxy"),
        invertX: document.getElementById("invertx"),
        invertY: document.getElementById("inverty"),
        filterMode: document.getElementById("filter-mode"),
        flowGain: document.getElementById("gain"),
        flowEmaAlpha: document.getElementById("flow-alpha"),
        deadband: document.getElementById("deadband"),
        headingBiasDeg: document.getElementById("heading-bias"),
        headingSmoothAlpha: document.getElementById("heading-alpha"),
        dtMaxMs: document.getElementById("dt-max"),
        dtFallbackMs: document.getElementById("dt-fallback"),
        pollMs: document.getElementById("poll-ms"),
        flowQualityMin: document.getElementById("flow-q-min"),
        distanceMinM: document.getElementById("dist-min"),
        distanceMaxM: document.getElementById("dist-max"),
        flowSpeedMaxMps: document.getElementById("speed-max"),
        kfQ: document.getElementById("kf-q"),
        kfR: document.getElementById("kf-r"),
        compAlpha: document.getElementById("comp-alpha"),
        ekfHaccBaseM: document.getElementById("ekf-hacc"),
        ekfVaccBaseM: document.getElementById("ekf-vacc"),
        ekfSaccBaseMps: document.getElementById("ekf-sacc"),
        ekfLowQHaccScale: document.getElementById("ekf-lowq-hacc"),
        ekfLowQSaccScale: document.getElementById("ekf-lowq-sacc"),
      };
      const filterChips = Array.from(document.querySelectorAll("[data-filter-mode]"));
      const vals = {
        flowGain: document.getElementById("gain-val"),
        flowEmaAlpha: document.getElementById("flow-alpha-val"),
        deadband: document.getElementById("deadband-val"),
        headingBiasDeg: document.getElementById("heading-bias-val"),
        headingSmoothAlpha: document.getElementById("heading-alpha-val"),
        dtMaxMs: document.getElementById("dt-max-val"),
        dtFallbackMs: document.getElementById("dt-fallback-val"),
        pollMs: document.getElementById("poll-ms-val"),
        flowQualityMin: document.getElementById("flow-q-min-val"),
        distanceMinM: document.getElementById("dist-min-val"),
        distanceMaxM: document.getElementById("dist-max-val"),
        flowSpeedMaxMps: document.getElementById("speed-max-val"),
        kfQ: document.getElementById("kf-q-val"),
        kfR: document.getElementById("kf-r-val"),
        compAlpha: document.getElementById("comp-alpha-val"),
        ekfHaccBaseM: document.getElementById("ekf-hacc-val"),
        ekfVaccBaseM: document.getElementById("ekf-vacc-val"),
        ekfSaccBaseMps: document.getElementById("ekf-sacc-val"),
        ekfLowQHaccScale: document.getElementById("ekf-lowq-hacc-val"),
        ekfLowQSaccScale: document.getElementById("ekf-lowq-sacc-val"),
      };
      const ekfPreviewEl = document.getElementById("ekf-preview");

      const state = {
        tuning: { ...DEFAULTS },
        points: [[0, 0]],
        x: 0,
        y: 0,
        emaVx: 0,
        emaVy: 0,
        lastTimeMs: null,
        headingSmoothedDeg: null,
        headingDeg: null,
        vxWorld: 0,
        vyWorld: 0,
        flowQ: null,
        distM: null,
        filterVx: 0,
        filterVy: 0,
        headingSource: "real",
        kf: {
          vE: 0,
          vN: 0,
          pE: 1.0,
          pN: 1.0,
        },
        comp: {
          vE: 0,
          vN: 0,
        },
        ekfOut: {
          useGps: false,
          reason: "init",
          hacc: null,
          vacc: null,
          sacc: null,
        },
        lastFilterMode: "ema",
      };

      const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
      const asFinite = (...vals) => {
        for (const v of vals) {
          const n = Number(v);
          if (Number.isFinite(n)) return n;
        }
        return null;
      };
      const headingFromVelocity = (vx, vy, minSpeed = 0.005) => {
        const x = Number(vx);
        const y = Number(vy);
        if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
        if (Math.hypot(x, y) < minSpeed) return null;
        return (Math.atan2(x, y) * 180.0 / Math.PI + 360.0) % 360.0;
      };
      const wrapHeading = (deg) => {
        const n = Number(deg);
        if (!Number.isFinite(n)) return null;
        return ((n % 360) + 360) % 360;
      };
      const headingDelta = (target, base) => {
        const t = wrapHeading(target);
        const b = wrapHeading(base);
        if (!Number.isFinite(t) || !Number.isFinite(b)) return 0;
        return ((t - b + 540) % 360) - 180;
      };
      const compassNoiseFilterState = {
        realSmoothed: null,
        pixhawkSmoothed: null,
      };
      const COMPASS_DENOISE_ALPHA = 0.18;
      const COMPASS_MAX_STEP_DEG = 10.0;
      const denoiseCompassHeading = (rawHeading) => {
        const raw = wrapHeading(rawHeading);
        if (!Number.isFinite(raw)) {
          return Number.isFinite(compassNoiseFilterState.realSmoothed)
            ? compassNoiseFilterState.realSmoothed
            : null;
        }
        if (!Number.isFinite(compassNoiseFilterState.realSmoothed)) {
          compassNoiseFilterState.realSmoothed = raw;
          return raw;
        }
        const d = headingDelta(raw, compassNoiseFilterState.realSmoothed);
        if (!Number.isFinite(d)) return compassNoiseFilterState.realSmoothed;
        const limited = clamp(d, -COMPASS_MAX_STEP_DEG, COMPASS_MAX_STEP_DEG);
        compassNoiseFilterState.realSmoothed = wrapHeading(
          compassNoiseFilterState.realSmoothed + limited * COMPASS_DENOISE_ALPHA
        );
        return compassNoiseFilterState.realSmoothed;
      };
      const denoisePixhawkHeading = (rawHeading) => {
        const raw = wrapHeading(rawHeading);
        if (!Number.isFinite(raw)) {
          return Number.isFinite(compassNoiseFilterState.pixhawkSmoothed)
            ? compassNoiseFilterState.pixhawkSmoothed
            : null;
        }
        if (!Number.isFinite(compassNoiseFilterState.pixhawkSmoothed)) {
          compassNoiseFilterState.pixhawkSmoothed = raw;
          return raw;
        }
        const d = headingDelta(raw, compassNoiseFilterState.pixhawkSmoothed);
        if (!Number.isFinite(d)) return compassNoiseFilterState.pixhawkSmoothed;
        const limited = clamp(d, -COMPASS_MAX_STEP_DEG, COMPASS_MAX_STEP_DEG);
        compassNoiseFilterState.pixhawkSmoothed = wrapHeading(
          compassNoiseFilterState.pixhawkSmoothed + limited * COMPASS_DENOISE_ALPHA
        );
        return compassNoiseFilterState.pixhawkSmoothed;
      };
      const headingFromMag = (xMg, yMg) => {
        const x = Number(xMg);
        const y = Number(yMg);
        if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
        return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
      };
      const rotateOpticalVelocityByHeading = (vxBody, vyBody, headingDeg) => {
        const vx = Number(vxBody);
        const vy = Number(vyBody);
        const hdg = Number(headingDeg);
        if (!Number.isFinite(vx) || !Number.isFinite(vy) || !Number.isFinite(hdg)) {
          return { vx, vy };
        }
        const rad = (hdg * Math.PI) / 180.0;
        const sinH = Math.sin(rad);
        const cosH = Math.cos(rad);
        return {
          vx: vx * sinH + vy * cosH,
          vy: vx * cosH - vy * sinH,
        };
      };
      const filterSignal = (prev, raw, alpha = 0.2, deadband = 0.0, maxStep = 1e9) => {
        let value = Number.isFinite(raw) ? raw : prev;
        if (Math.abs(value) < deadband) value = 0;
        const delta = value - prev;
        if (Math.abs(delta) > maxStep) value = prev + Math.sign(delta) * maxStep;
        return prev + alpha * (value - prev);
      };
      const applyDeadband = (v, d) => (Math.abs(v) < d ? 0 : v);

      const urlParams = new URLSearchParams(window.location.search);
      const headingSourceParam = (urlParams.get("heading_source") || "real").toLowerCase();
      if (headingSourceParam === "vo" || headingSourceParam === "real" || headingSourceParam === "pixhawk") {
        state.headingSource = headingSourceParam;
      }

      const norm = (raw = {}) => {
        const num = (v, lo, hi, fallback) => {
          const n = Number(v);
          return Number.isFinite(n) ? clamp(n, lo, hi) : fallback;
        };
        return {
          swapXY: !!raw.swapXY,
          invertX: !!raw.invertX,
          invertY: !!raw.invertY,
          filterMode: ["ema", "kf", "complementary"].includes(String(raw.filterMode || "").toLowerCase())
            ? String(raw.filterMode).toLowerCase()
            : DEFAULTS.filterMode,
          flowGain: num(raw.flowGain, 0.3, 2.5, DEFAULTS.flowGain),
          flowEmaAlpha: num(raw.flowEmaAlpha, 0.01, 1.0, DEFAULTS.flowEmaAlpha),
          deadband: num(raw.deadband, 0.0, 0.2, DEFAULTS.deadband),
          headingBiasDeg: num(raw.headingBiasDeg, -45.0, 45.0, DEFAULTS.headingBiasDeg),
          headingSmoothAlpha: num(raw.headingSmoothAlpha, 0.01, 1.0, DEFAULTS.headingSmoothAlpha),
          dtMaxMs: num(raw.dtMaxMs, 50, 500, DEFAULTS.dtMaxMs),
          dtFallbackMs: num(raw.dtFallbackMs, 10, 120, DEFAULTS.dtFallbackMs),
          pollMs: num(raw.pollMs, 40, 300, DEFAULTS.pollMs),
          flowQualityMin: num(raw.flowQualityMin, 0, 255, DEFAULTS.flowQualityMin),
          distanceMinM: num(raw.distanceMinM, 0.0, 1.0, DEFAULTS.distanceMinM),
          distanceMaxM: num(raw.distanceMaxM, 1.0, 20.0, DEFAULTS.distanceMaxM),
          flowSpeedMaxMps: num(raw.flowSpeedMaxMps, 0.2, 12.0, DEFAULTS.flowSpeedMaxMps),
          kfQ: num(raw.kfQ, 0.001, 1.0, DEFAULTS.kfQ),
          kfR: num(raw.kfR, 0.001, 1.0, DEFAULTS.kfR),
          compAlpha: num(raw.compAlpha, 0.0, 1.0, DEFAULTS.compAlpha),
          ekfHaccBaseM: num(raw.ekfHaccBaseM, 0.1, 10.0, DEFAULTS.ekfHaccBaseM),
          ekfVaccBaseM: num(raw.ekfVaccBaseM, 0.2, 15.0, DEFAULTS.ekfVaccBaseM),
          ekfSaccBaseMps: num(raw.ekfSaccBaseMps, 0.05, 5.0, DEFAULTS.ekfSaccBaseMps),
          ekfLowQHaccScale: num(raw.ekfLowQHaccScale, 1.0, 10.0, DEFAULTS.ekfLowQHaccScale),
          ekfLowQSaccScale: num(raw.ekfLowQSaccScale, 1.0, 10.0, DEFAULTS.ekfLowQSaccScale),
        };
      };

      const loadTuning = () => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? norm(JSON.parse(raw)) : { ...DEFAULTS };
        } catch (_) {
          return { ...DEFAULTS };
        }
      };
      const loadDefaultTuning = () => {
        try {
          const raw = localStorage.getItem(DEFAULT_STORAGE_KEY);
          return raw ? norm(JSON.parse(raw)) : { ...DEFAULTS };
        } catch (_) {
          return { ...DEFAULTS };
        }
      };
      const saveDefaultTuning = (tuning) => {
        try {
          localStorage.setItem(DEFAULT_STORAGE_KEY, JSON.stringify(norm(tuning)));
        } catch (_) {
          // ignore
        }
      };
      let defaultTuning = loadDefaultTuning();

      function applyTuningToUi() {
        const t = state.tuning;
        controls.swapXY.checked = t.swapXY;

        controls.ekfLowQSaccScale.value = t.ekfLowQSaccScale.toFixed(1);

        vals.flowGain.textContent = t.flowGain.toFixed(3);
        vals.flowEmaAlpha.textContent = t.flowEmaAlpha.toFixed(3);
        vals.deadband.textContent = t.deadband.toFixed(3);
        vals.headingBiasDeg.textContent = t.headingBiasDeg.toFixed(1);
        vals.headingSmoothAlpha.textContent = t.headingSmoothAlpha.toFixed(3);

      function readTuningFromUi() {
        state.tuning = norm({
          swapXY: controls.swapXY.checked,
          invertX: controls.invertX.checked,
          invertY: controls.invertY.checked,
          filterMode: controls.filterMode.value,
          flowGain: controls.flowGain.value,
          flowEmaAlpha: controls.flowEmaAlpha.value,
          deadband: controls.deadband.value,
          headingBiasDeg: controls.headingBiasDeg.value,
          headingSmoothAlpha: controls.headingSmoothAlpha.value,
          dtMaxMs: controls.dtMaxMs.value,
          dtFallbackMs: controls.dtFallbackMs.value,
          pollMs: controls.pollMs.value,
          flowQualityMin: controls.flowQualityMin.value,
          distanceMinM: controls.distanceMinM.value,
          distanceMaxM: controls.distanceMaxM.value,
          flowSpeedMaxMps: controls.flowSpeedMaxMps.value,
          kfQ: controls.kfQ.value,
          kfR: controls.kfR.value,
          compAlpha: controls.compAlpha.value,
          ekfHaccBaseM: controls.ekfHaccBaseM.value,
          ekfVaccBaseM: controls.ekfVaccBaseM.value,
          ekfSaccBaseMps: controls.ekfSaccBaseMps.value,
          ekfLowQHaccScale: controls.ekfLowQHaccScale.value,
          ekfLowQSaccScale: controls.ekfLowQSaccScale.value,
        });
        if (state.tuning.distanceMinM > state.tuning.distanceMaxM) {
          const mid = state.tuning.distanceMinM;
          state.tuning.distanceMinM = state.tuning.distanceMaxM;
          state.tuning.distanceMaxM = mid;
        }
        applyTuningToUi();
        restartPolling();
      }

      function resetPath() {
        state.points = [[0, 0]];
        state.x = 0;
        state.y = 0;
        state.emaVx = 0;
        state.emaVy = 0;
        state.filterVx = 0;
        state.filterVy = 0;
        state.lastTimeMs = null;
        state.headingSmoothedDeg = null;
        state.kf.vE = 0;
        state.kf.vN = 0;
        state.kf.pE = 1.0;
        state.kf.pN = 1.0;
        state.comp.vE = 0;
        state.comp.vN = 0;
        state.ekfOut = {
          useGps: false,
          reason: "reset",
          hacc: null,
          vacc: null,
          sacc: null,
        };
      }

      function evaluateFlowGate(flowQ, distM, speedMps) {
        if (!Number.isFinite(flowQ) || flowQ < state.tuning.flowQualityMin) {
          return { ok: false, reason: "low_flow_q" };
        }
        if (!Number.isFinite(distM) || distM < state.tuning.distanceMinM || distM > state.tuning.distanceMaxM) {
          return { ok: false, reason: "distance_gate" };
        }
        if (!Number.isFinite(speedMps) || speedMps > state.tuning.flowSpeedMaxMps) {
          return { ok: false, reason: "speed_gate" };
        }
        return { ok: true, reason: "ok" };
      }

      function calcEkfAccuracy(flowQ, gateOk) {
        const qMin = state.tuning.flowQualityMin;
        const qNorm = clamp((Number(flowQ) - qMin) / Math.max(1, 255 - qMin), 0, 1);
        if (!gateOk) {
          return {
            hacc: Math.max(8.0, state.tuning.ekfHaccBaseM * 12.0),
            vacc: Math.max(12.0, state.tuning.ekfVaccBaseM * 10.0),
            sacc: Math.max(2.5, state.tuning.ekfSaccBaseMps * 8.0),
          };
        }
        const hacc = state.tuning.ekfHaccBaseM * (1.0 + (1.0 - qNorm) * state.tuning.ekfLowQHaccScale);
        const sacc = state.tuning.ekfSaccBaseMps * (1.0 + (1.0 - qNorm) * state.tuning.ekfLowQSaccScale);
        const vacc = state.tuning.ekfVaccBaseM * (1.0 + (1.0 - qNorm) * 1.2);
        return { hacc, vacc, sacc };
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const cssW = Math.max(320, Math.floor(rect.width || 1280));
        const cssH = Math.max(320, Math.floor(rect.height || 720));
        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        const w = Math.floor(cssW * dpr);
        const h = Math.floor(cssH * dpr);
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
      }

      function drawArrow(x, y, angleRad, len, tailBack, shaftLen, wing, shaftColor, headColor, lineWidth) {
        const dx = Math.sin(angleRad);
        const dy = -Math.cos(angleRad);
        const tipX = x + dx * len;
        const tipY = y + dy * len;
        const tailX = x - dx * tailBack;
        const tailY = y - dy * tailBack;
        const headBaseX = tipX - dx * shaftLen;
        const headBaseY = tipY - dy * shaftLen;
        const nx = -dy;
        const ny = dx;

        ctx.strokeStyle = shaftColor;
        ctx.lineWidth = lineWidth;
        ctx.beginPath();
        ctx.moveTo(tailX, tailY);
        ctx.lineTo(headBaseX, headBaseY);
        ctx.stroke();

        ctx.fillStyle = headColor;
        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.lineTo(headBaseX + nx * wing, headBaseY + ny * wing);
        ctx.lineTo(headBaseX - nx * wing, headBaseY - ny * wing);
        ctx.closePath();
        ctx.fill();
      }

      function safeRange(min, max, minSpan) {
        if (!Number.isFinite(min) || !Number.isFinite(max)) return [-1, 1];
        if (min === max) {
          const pad = Math.max(minSpan, Math.abs(min) * 0.2, 1);
          return [min - pad, max + pad];
        }
        const span = max - min;
        const pad = Math.max(span * 0.15, minSpan);
        return [min - pad, max + pad];
      }

      function drawPlot() {
        resizeCanvas();
        const rect = canvas.getBoundingClientRect();
        const w = Math.max(320, Math.floor(rect.width || 1280));
        const h = Math.max(320, Math.floor(rect.height || 720));
        const pad = 36;

        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, w, h);
        const points = state.points;
        if (!points.length) return;

        let minX = points[0][0], maxX = points[0][0];
        let minY = points[0][1], maxY = points[0][1];
        for (const [x, y] of points) {
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
        if (0 < minX) minX = 0;
        if (0 > maxX) maxX = 0;
        if (0 < minY) minY = 0;
        if (0 > maxY) maxY = 0;

        const [x0, x1] = safeRange(minX, maxX, 1.0);
        const [y0, y1] = safeRange(minY, maxY, 1.0);
        const toPx = (x) => pad + ((x - x0) * (w - 2 * pad) / (x1 - x0 || 1));
        const toPy = (y) => h - pad - ((y - y0) * (h - 2 * pad) / (y1 - y0 || 1));

        ctx.strokeStyle = "#e2e8f0";
        ctx.lineWidth = 1;
        for (let i = 0; i <= 8; i += 1) {
          const gy = pad + ((h - 2 * pad) * i / 8);
          const gx = pad + ((w - 2 * pad) * i / 8);
          ctx.beginPath(); ctx.moveTo(pad, gy); ctx.lineTo(w - pad, gy); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(gx, pad); ctx.lineTo(gx, h - pad); ctx.stroke();
        }

        const ox = toPx(0);
        const oy = toPy(0);
        ctx.strokeStyle = "#94a3b8";
        ctx.lineWidth = 1.6;
        ctx.beginPath(); ctx.moveTo(pad, oy); ctx.lineTo(w - pad, oy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ox, pad); ctx.lineTo(ox, h - pad); ctx.stroke();

        ctx.fillStyle = "#334155";
        ctx.font = "12px sans-serif";
        ctx.fillText("Longitude East (+X)", w - pad - 130, oy - 8);
        ctx.fillText("Latitude North (+Y)", ox + 6, pad - 8);
        ctx.fillText("Home (0,0)", ox + 8, oy - 8);

        ctx.strokeStyle = "#16a34a";
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        points.forEach(([x, y], i) => {
          const px = toPx(x);
          const py = toPy(y);
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        });
        ctx.stroke();

        const [lx, ly] = points[points.length - 1];
        const lpx = toPx(lx);
        const lpy = toPy(ly);
        const hasHeading = Number.isFinite(Number(state.headingDeg));
        const vx = Number(state.vxWorld);
        const vy = Number(state.vyWorld);
        const hasVel = Number.isFinite(vx) && Number.isFinite(vy);

        if (hasVel) {
          const maxVelRef = 1.0;
          const normX = clamp(vx / maxVelRef, -1, 1);
          const normY = clamp(vy / maxVelRef, -1, 1);
          const tipX = lpx + normX * (w - 2 * pad) * 0.12;
          const tipY = lpy - normY * (h - 2 * pad) * 0.12;
          const dirX = tipX - lpx;
          const dirY = tipY - lpy;
          const mag = Math.hypot(dirX, dirY);
          if (mag > 1e-6) {
            const ux = dirX / mag;
            const uy = dirY / mag;
            const nx = -uy;
            const ny = ux;
            const head = 11;
            const wing = 6;
            const baseX = tipX - ux * head;
            const baseY = tipY - uy * head;

            ctx.strokeStyle = "rgba(15,23,42,0.20)";
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(lpx + 2, lpy + 2);
            ctx.lineTo(baseX + 2, baseY + 2);
            ctx.stroke();

            ctx.strokeStyle = "#2563eb";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(lpx, lpy);
            ctx.lineTo(baseX, baseY);
            ctx.stroke();

            ctx.fillStyle = "#1d4ed8";
            ctx.beginPath();
            ctx.moveTo(tipX, tipY);
            ctx.lineTo(baseX + nx * wing, baseY + ny * wing);
            ctx.lineTo(baseX - nx * wing, baseY - ny * wing);
            ctx.closePath();
            ctx.fill();
          }
        }

        if (hasHeading) {
          const headingRad = Number(state.headingDeg) * Math.PI / 180.0;
          drawArrow(lpx, lpy, headingRad, 26, 8, 10, 4, "#dc2626", "#ef4444", 2.5);
        }
        const markerHeadingDeg = hasHeading
          ? Number(state.headingDeg)
          : (hasVel ? ((Math.atan2(vx, vy) * 180.0 / Math.PI + 360.0) % 360.0) : null);
        if (Number.isFinite(markerHeadingDeg)) {
          drawArrow(lpx, lpy, Number(markerHeadingDeg) * Math.PI / 180.0, 16, 6, 7, 3, "#030712", "#111827", 2.2);
        }

        const hdgText = hasHeading ? Number(state.headingDeg).toFixed(1) : "--";
        const vxText = hasVel ? vx.toFixed(3) : "--";
        const vyText = hasVel ? vy.toFixed(3) : "--";
        ctx.fillStyle = "#0f172a";
        ctx.font = "12px monospace";
        ctx.fillText(`vx=${vxText} m/s vy=${vyText} m/s zrot=${hdgText} deg`, lpx + 10, lpy - 12);
      }

      async function refresh() {
        try {
          const r = await fetch("/data", { cache: "no-store" });
          const data = await r.json();
          const opt = data?.sensors?.optical_flow || {};
          const realHeadingRaw = wrapHeading(headingFromMag(data?.compass?.incoming?.x_mg, data?.compass?.incoming?.y_mg));
          const realHeading = denoiseCompassHeading(realHeadingRaw);
          const pixhawkHeadingRaw = wrapHeading(
            asFinite(data?.sensors?.attitude?.yaw) != null
              ? (Number(data.sensors.attitude.yaw) * 180.0) / Math.PI
              : null
          );
          const pixhawkHeading = denoisePixhawkHeading(pixhawkHeadingRaw);
          const voHeading = wrapHeading(headingFromVelocity(data?.camera?.vx, data?.camera?.vy, 0.005));
          let heading = wrapHeading(
            state.headingSource === "vo"
              ? voHeading
              : (state.headingSource === "pixhawk" ? pixhawkHeading : realHeading)
          );
          heading = wrapHeading(asFinite(heading, realHeading, pixhawkHeading, voHeading));
          if (Number.isFinite(heading)) {
            heading = wrapHeading(heading + state.tuning.headingBiasDeg);
            if (!Number.isFinite(state.headingSmoothedDeg)) {
              state.headingSmoothedDeg = heading;
            } else {
              const d = headingDelta(heading, state.headingSmoothedDeg);
              state.headingSmoothedDeg = wrapHeading(state.headingSmoothedDeg + d * state.tuning.headingSmoothAlpha);
            }
            heading = state.headingSmoothedDeg;
          }
          state.headingDeg = heading;

          const isOptical = data?.source === "optical_flow" || String(data?.mode || "").startsWith("optical_flow");
          let rawVx = isOptical
            ? (asFinite(opt?.speed_x, opt?.flow_vx, 0) || 0)
            : (asFinite(data?.camera?.vx, 0) || 0);
          let rawVy = isOptical
            ? (asFinite(opt?.speed_y, opt?.flow_vy, 0) || 0)
            : (asFinite(data?.camera?.vy, 0) || 0);
          if (Number.isFinite(heading)) {
            const rotated = rotateOpticalVelocityByHeading(rawVx, rawVy, heading);
            rawVx = Number.isFinite(rotated.vx) ? rotated.vx : rawVx;
            rawVy = Number.isFinite(rotated.vy) ? rotated.vy : rawVy;
          }
          const vxFiltered = filterSignal(state.filterVx, rawVx, 0.18, 0.02, 0.25);
          const vyFiltered = filterSignal(state.filterVy, rawVy, 0.18, 0.02, 0.25);
          state.filterVx = vxFiltered;
          state.filterVy = vyFiltered;

          let vxBody = vxFiltered;
          let vyBody = vyFiltered;
          if (state.tuning.swapXY) {
            const t = vxBody; vxBody = vyBody; vyBody = t;
          }
          if (state.tuning.invertX) vxBody = -vxBody;
          if (state.tuning.invertY) vyBody = -vyBody;
          vxBody = applyDeadband(vxBody, state.tuning.deadband);
          vyBody = applyDeadband(vyBody, state.tuning.deadband);

          const nowMs = Date.now();
          if (state.lastFilterMode !== state.tuning.filterMode) {
            state.emaVx = 0;
            state.emaVy = 0;
            state.kf.vE = 0;
            state.kf.vN = 0;
            state.kf.pE = 1.0;
            state.kf.pN = 1.0;
            state.comp.vE = 0;
            state.comp.vN = 0;
            state.lastFilterMode = state.tuning.filterMode;
          }
          const dtFallback = state.tuning.dtFallbackMs / 1000.0;
          let dt = dtFallback;
          if (Number.isFinite(state.lastTimeMs)) {
            dt = (nowMs - state.lastTimeMs) / 1000.0;
            if (!(dt > 0 && dt <= state.tuning.dtMaxMs / 1000.0)) dt = dtFallback;
          }
          state.lastTimeMs = nowMs;

          state.flowQ = opt?.flow_q;
          state.distM = asFinite(opt?.height_m, opt?.distance_mm != null ? Number(opt.distance_mm) / 1000.0 : null);
          const flowSpeedMps = Math.hypot(vxBody, vyBody);
          const gate = evaluateFlowGate(asFinite(state.flowQ), asFinite(state.distM), flowSpeedMps);

          const imuAxBody = asFinite(data?.sensors?.imu?.ax, 0) || 0;
          const imuAyBody = asFinite(data?.sensors?.imu?.ay, 0) || 0;
          const imuRot = Number.isFinite(heading)
            ? rotateOpticalVelocityByHeading(imuAxBody, imuAyBody, heading)
            : { vx: imuAxBody, vy: imuAyBody };
          const imuAxWorld = Number.isFinite(imuRot.vx) ? imuRot.vx : 0;
          const imuAyWorld = Number.isFinite(imuRot.vy) ? imuRot.vy : 0;

          let vxWorld = vxBody;
          let vyWorld = vyBody;
          if (state.tuning.filterMode === "kf") {
            const vPredE = state.kf.vE + imuAxWorld * dt;
            const vPredN = state.kf.vN + imuAyWorld * dt;
            const pPredE = state.kf.pE + state.tuning.kfQ * dt;
            const pPredN = state.kf.pN + state.tuning.kfQ * dt;
            if (gate.ok) {
              const kE = pPredE / (pPredE + state.tuning.kfR);
              const kN = pPredN / (pPredN + state.tuning.kfR);
              state.kf.vE = vPredE + kE * (vxBody - vPredE);
              state.kf.vN = vPredN + kN * (vyBody - vPredN);
              state.kf.pE = (1.0 - kE) * pPredE;
              state.kf.pN = (1.0 - kN) * pPredN;
            } else {
              state.kf.vE = vPredE;
              state.kf.vN = vPredN;
              state.kf.pE = pPredE;
              state.kf.pN = pPredN;
            }
            vxWorld = state.kf.vE;
            vyWorld = state.kf.vN;
          } else if (state.tuning.filterMode === "complementary") {
            const predVx = state.comp.vE + imuAxWorld * dt;
            const predVy = state.comp.vN + imuAyWorld * dt;
            const alpha = state.tuning.compAlpha;
            if (gate.ok) {
              state.comp.vE = alpha * predVx + (1.0 - alpha) * vxBody;
              state.comp.vN = alpha * predVy + (1.0 - alpha) * vyBody;
            } else {
              state.comp.vE = predVx;
              state.comp.vN = predVy;
            }
            vxWorld = state.comp.vE;
            vyWorld = state.comp.vN;
          } else {
            state.emaVx = state.tuning.flowEmaAlpha * vxWorld + (1.0 - state.tuning.flowEmaAlpha) * state.emaVx;
            state.emaVy = state.tuning.flowEmaAlpha * vyWorld + (1.0 - state.tuning.flowEmaAlpha) * state.emaVy;
            vxWorld = state.emaVx;
            vyWorld = state.emaVy;
          }

          state.x += vxWorld * dt * state.tuning.flowGain;
          state.y += vyWorld * dt * state.tuning.flowGain;
          state.vxWorld = vxWorld;
          state.vyWorld = vyWorld;

          const ekfAcc = calcEkfAccuracy(asFinite(state.flowQ, 0), gate.ok && Number.isFinite(heading));
          state.ekfOut = {
            useGps: gate.ok && Number.isFinite(heading),
            reason: gate.reason,
            hacc: ekfAcc.hacc,
            vacc: ekfAcc.vacc,
            sacc: ekfAcc.sacc,
          };
          if (ekfPreviewEl) {
            ekfPreviewEl.textContent =
              `EKF out preview: mode=${state.tuning.filterMode.toUpperCase()} ` +
              `use_gps=${state.ekfOut.useGps ? "true" : "false"} reason=${state.ekfOut.reason} ` +
              `hacc=${state.ekfOut.hacc.toFixed(2)}m vacc=${state.ekfOut.vacc.toFixed(2)}m sacc=${state.ekfOut.sacc.toFixed(2)}m/s`;
          }

          state.points.push([state.x, state.y]);
          if (state.points.length > 2500) state.points.shift();

          drawPlot();

          const hdgText = Number.isFinite(state.headingDeg) ? state.headingDeg.toFixed(1) : "--";
          const qText = asFinite(state.flowQ);
          const dText = asFinite(state.distM);
          statusEl.textContent =
            `x=${state.x.toFixed(3)}m y=${state.y.toFixed(3)}m | ` +
            `vx=${state.vxWorld.toFixed(3)} vy=${state.vyWorld.toFixed(3)} m/s | ` +
            `heading=${hdgText}deg (${state.headingSource}) | q=${qText ?? "--"} dist=${Number.isFinite(dText) ? dText.toFixed(3) : "--"}m | ` +
            `filter=${state.tuning.filterMode} gate=${state.ekfOut.reason} hacc=${state.ekfOut.hacc.toFixed(2)} sacc=${state.ekfOut.sacc.toFixed(2)}`;
        } catch (err) {
          statusEl.textContent = `Failed to fetch /data: ${err?.message || "unknown error"}`;
        }
      }

      function restartPolling() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(refresh, Math.round(state.tuning.pollMs));
      }

      document.getElementById("save-btn").addEventListener("click", () => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(norm(state.tuning)));
          defaultTuning = norm(state.tuning);
          saveDefaultTuning(defaultTuning);
          statusEl.textContent = "Tuning saved.";
        } catch (_) {
          statusEl.textContent = "Save failed.";
        }
      });

      document.getElementById("default-btn").addEventListener("click", () => {
        state.tuning = { ...defaultTuning };
        applyTuningToUi();
        resetPath();
        restartPolling();
        statusEl.textContent = "Default baseline loaded.";
      });

      document.getElementById("reset-btn").addEventListener("click", () => {
        resetPath();
        drawPlot();
        statusEl.textContent = "Path reset.";
      });

      document.getElementById("back-btn").addEventListener("click", () => {
        window.location.href = "/gui.html";
      });

      Object.values(controls).forEach((el) => {
        el.addEventListener("input", () => {
          readTuningFromUi();
          // Keep current tuning as baseline default for this big view.
          defaultTuning = norm(state.tuning);
          saveDefaultTuning(defaultTuning);
          statusEl.textContent = "Live tuning active (not saved).";
        });
      });
      filterChips.forEach((chip) => {
        chip.addEventListener("click", () => {
          controls.filterMode.value = chip.dataset.filterMode || "ema";
          readTuningFromUi();
          defaultTuning = norm(state.tuning);
          saveDefaultTuning(defaultTuning);
          statusEl.textContent = `Filter selected: ${state.tuning.filterMode.toUpperCase()}`;
        });
      });

      window.addEventListener("resize", () => {
        if (resizeHandle) cancelAnimationFrame(resizeHandle);
        resizeHandle = requestAnimationFrame(() => {
          resizeHandle = null;
          drawPlot();
        });
      });

      state.tuning = loadTuning();
      state.lastFilterMode = state.tuning.filterMode;
      applyTuningToUi();
      drawPlot();
      refresh();
      restartPolling();
    </script>
  </body>
</html>
